suite: labels
templates:
  - archestra-platform.yaml
  - archestra-worker.yaml
values:
  - ../ci/test-values.yaml
tests:
  # ── Platform Deployment ──

  - it: platform Deployment pod labels include component=web and part-of=archestra
    template: archestra-platform.yaml
    documentIndex: 1 # Deployment is second document (after Service)
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: web
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/part-of"]
          value: archestra

  - it: platform Deployment metadata labels include part-of=archestra
    template: archestra-platform.yaml
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: archestra

  - it: platform Deployment selector does NOT include component label
    template: archestra-platform.yaml
    documentIndex: 1
    asserts:
      - isNull:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]

  - it: platform Service selector does NOT include component label
    template: archestra-platform.yaml
    documentIndex: 0
    asserts:
      - isNull:
          path: spec.selector["app.kubernetes.io/component"]

  # ── Worker Deployment ──

  - it: worker Deployment pod labels include component=worker and part-of=archestra
    template: archestra-worker.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: worker
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/part-of"]
          value: archestra

  - it: worker Deployment metadata labels include part-of=archestra
    template: archestra-worker.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: archestra

  - it: worker Deployment selector includes component=worker
    template: archestra-worker.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: worker

  - it: worker Deployment has distinct name suffix
    template: archestra-worker.yaml
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "-worker$"

  - it: worker pods use different app name than platform pods
    template: archestra-worker.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: archestra-platform-worker

  # ── Worker disabled ──

  - it: worker Deployment is not rendered when disabled
    template: archestra-worker.yaml
    set:
      archestra.worker.enabled: false
    asserts:
      - hasDocuments:
          count: 0
